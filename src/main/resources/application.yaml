spring:
  application:
    name: skillswap
  profiles:
    active: dev # Mặc định chạy ở máy sẽ dùng dev

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:3000}
      idle-timeout: 30000
      max-lifetime: 600000

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: false
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:1MB}
      max-request-size: ${MAX_REQUEST_SIZE:1MB}

server:
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:80}

application:
  demo-seed:
    enabled: ${APP_DEMO_SEED_ENABLED:false}
  upload:
    dir: ./uploads/files
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_EXPIRATION:3600000} # 1 hour
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days
    google:
      client-id: ${GOOGLE_CLIENT_ID}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
  cloudinary:
    enabled: ${CLOUDINARY_ENABLED:false}
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: skillswap # thư mục gốc trên Cloudinary
  r2:
    enabled: ${R2_ENABLED:false}
    endpoint: ${R2_ENDPOINT:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket: ${R2_BUCKET:}
    region: ${R2_REGION:auto}
    documents-prefix: ${R2_DOCUMENTS_PREFIX:skillswap/verification-documents}
  system-admin:
    emails: ${SYSTEM_ADMIN_EMAILS:}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{requestId}] - %msg%n"
