spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

application:
  cors:
    allowed-origin-patterns: http://localhost:3000
  security:
    jwt:
      secret-key: c2VjcmV0c2VjcmV0c2VjcmV0c2VjcmV0c2VjcmV0c2VjcmV0c2VjcmV0
      expiration: 86400000
      refresh-token:
        expiration: 604800000
    google:
      client-id: test-google-client-id
  upload:
    dir: ./target/uploads-test
  mail:
    enabled: false
