name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests & Verify
      env:
        SPRING_PROFILES_ACTIVE: test
      run: |
        chmod +x mvnw
        ./mvnw clean verify

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner in repo mode
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'table'
        severity: 'CRITICAL,HIGH'

  docker-publish:
    needs: security-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ github.sha }}
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy-vps:
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          mkdir -p ~/skillswap-deployment
          cd ~/skillswap-deployment

          # Cập nhật file compose
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml

          # Immutable image tag
          export APP_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          export APP_IMAGE=$(echo "$APP_IMAGE" | tr '[:upper:]' '[:lower:]')

          # Login (để pull private nếu cần)
          # echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          
          echo "Pulling image $APP_IMAGE..."
          docker compose -f docker-compose.prod.yml pull spring-backend

          # Backup DB trước khi up
          if [ -f ".env" ]; then
            set -a; source .env; set +a
          fi
          bash ops/backup-postgres.sh || exit 1

          echo "Starting containers..."
          # Deploy và wait readiness
          docker compose -f docker-compose.prod.yml up -d --wait || {
            echo "Deployment failed healthcheck. Fetching logs..."
            docker compose -f docker-compose.prod.yml logs --tail=100
            exit 1
          }
          
          echo "Deployment successful for $APP_IMAGE!"
