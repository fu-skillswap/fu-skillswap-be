services:
  postgres-db:
    image: postgres:17-alpine
    container_name: skillswap-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skillswapdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}

    ports:
      - "5444:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    mem_limit: 512m

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-skillswapdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - skillswap-network

  spring-backend:
    build: .
    container_name: skillswap-backend
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}

      - DATABASE_URL=jdbc:postgresql://postgres-db:5432/${POSTGRES_DB:-skillswapdb}
      - DATABASE_USERNAME=${POSTGRES_USER:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-123456}

      - FLYWAY_ENABLED=${FLYWAY_ENABLED:-false}
      - HIBERNATE_DDL_AUTO=${HIBERNATE_DDL_AUTO:-validate}

      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION}

      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - SYSTEM_ADMIN_EMAILS=${SYSTEM_ADMIN_EMAILS:-}

      - PAYOS_CLIENT_ID=${PAYOS_CLIENT_ID:-}
      - PAYOS_API_KEY=${PAYOS_API_KEY:-}
      - PAYOS_CHECKSUM_KEY=${PAYOS_CHECKSUM_KEY:-}
      - PAYOS_RETURN_URL=${PAYOS_RETURN_URL:-http://localhost:3000/payment/return}
      - PAYOS_CANCEL_URL=${PAYOS_CANCEL_URL:-http://localhost:3000/payment/cancel}
      - PAYOS_WEBHOOK_URL=${PAYOS_WEBHOOK_URL:-}
      - PAYOS_WEBHOOK_SECRET=${PAYOS_WEBHOOK_SECRET:-}

      - APPLICATION_MAIL_ENABLED=${APPLICATION_MAIL_ENABLED:-false}
      - APPLICATION_MAIL_FROM=${APPLICATION_MAIL_FROM:-no-reply@skillswap.asia}
      - APPLICATION_SWAGGER_ENABLED=${APPLICATION_SWAGGER_ENABLED:-false}

      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-smtp-relay.brevo.com}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-587}
      - SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME:-}
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD:-}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-true}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-true}

      - CLOUDINARY_ENABLED=${CLOUDINARY_ENABLED:-false}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

      - R2_ENABLED=${R2_ENABLED:-false}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_REGION=${R2_REGION:-auto}
      - R2_DOCUMENTS_PREFIX=${R2_DOCUMENTS_PREFIX:-skillswap/verification-documents}

      - CORS_ALLOWED_ORIGIN_PATTERNS=${CORS_ALLOWED_ORIGIN_PATTERNS}

    depends_on:
      postgres-db:
        condition: service_healthy

    mem_limit: 768m

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - skillswap-network

volumes:
  postgres_data:

networks:
  skillswap-network:
    driver: bridge
